<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperFly | Elite Experience</title>
    <style>
        :root {
            /* Tema Gelap & Mewah */
            --bg: #000000;
            --text-pure: #ffffff;
            --accent-gray: #1d1d1f;
            --shimmer: linear-gradient(
                120deg, 
                rgba(255,255,255,0) 30%, 
                rgba(255,255,255,0.8) 50%, 
                rgba(255,255,255,0) 70%
            );
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-pure);
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo dengan Efek Metalik Shimmer */
        .logo-box {
            position: relative;
            margin-bottom: 5px;
        }

        .logo-text {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: var(--text-pure);
            position: relative;
            opacity: 0;
            transform: scale(0.95);
            animation: revealFull 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            /* Efek gradasi hitam-putih bergerak */
            background: linear-gradient(
                90deg, 
                #ffffff 0%, 
                #333333 25%, 
                #ffffff 50%, 
                #333333 75%, 
                #ffffff 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: revealFull 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards, 
                       glossyMove 5s linear infinite;
        }

        .logo-text span {
            color: var(--text-pure);
            -webkit-text-fill-color: var(--text-pure);
        }

        .tagline {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 5px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            opacity: 0;
            animation: fadeIn 1.5s 0.8s forwards;
        }

        /* Circle Loader Tipis & Elegan */
        .loader-box {
            margin-top: 60px;
            position: relative;
            width: 40px;
            height: 40px;
            opacity: 0;
            animation: fadeIn 1s 1.2s forwards;
        }

        .circle-loader {
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1); /* Garis redup */
            border-top: 1px solid #ffffff; /* Garis putih tajam */
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        /* Keyframes */
        @keyframes revealFull {
            to { 
                opacity: 1; 
                transform: scale(1); 
            }
        }

        @keyframes glossyMove {
            to { background-position: 200% center; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Exit Animation */
        .fade-out {
            opacity: 0;
            transform: scale(1.05);
            filter: blur(10px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body id="body">

    <div class="container">
        <div class="logo-box">
            <h1 class="logo-text">SuperFly<span>.</span></h1>
        </div>
        
        <p class="tagline">The Art of Delivery</p>
        
        <div class="loader-box">
            <div class="circle-loader"></div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            // Splash screen selama 3.5 detik
            setTimeout(() => {
                document.getElementById('body').classList.add('fade-out');
                setTimeout(() => {
                    // Pastikan file login.html sudah ada
                    window.location.replace('login.html'); 
                }, 800);
            }, 3500);
        });
    </script>
</body>
</html>
